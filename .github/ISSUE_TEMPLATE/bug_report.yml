name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: input
    id: plugin-version
    attributes:
      label: Pumice version
      description: Settings → Community plugins → Pumice
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: settings
    attributes:
      label: Relevant settings
      description: e.g. useTls, conflictResolution, enableE2EE — anything non-default that might matter
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console output / logs
      description: Open Obsidian's developer console (Ctrl/Cmd+Shift+I) and paste any relevant errors.
      render: shell
    validations:
      required: false
